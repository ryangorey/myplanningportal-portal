<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create an account | myplanningportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal-styles.css">
</head>
<body>

<div class="portal-page">
  <img class="portal-logo" id="portal-logo" src="https://raw.githubusercontent.com/ryangorey/RGMLlogo/102e74830a7fd89dca2451699469c742463da962/my_planning_portal_logo_dark_bg_small.png" alt="myplanningportal">

  <div class="portal-card">
    <h1>Create an account</h1>
    <p class="portal-sub">One account for every event you're planning with us.</p>

    <div id="status" class="portal-status"></div>

    <form id="signup-form">
      <label for="first-name">First name</label>
      <input type="text" id="first-name" name="first_name" autocomplete="given-name">
      <label for="last-name">Last name</label>
      <input type="text" id="last-name" name="last_name" autocomplete="family-name">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="name@email.com" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
      <label for="confirm-password">Confirm password</label>
      <input type="password" id="confirm-password" name="confirm_password" required minlength="8" autocomplete="new-password">
      <button type="submit" class="btn-primary" id="submit-btn">Create account</button>
    </form>

    <p class="portal-note">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <p class="portal-footer">Corporate events &middot; Weddings &middot; Full-service planning</p>
</div>

<script src="portal-config.js"></script>
<script>
  (async function applyBranding() {
    try {
      const resp = await fetch(API_BASE_URL + "/api/brands");
      const brands = await resp.json();
      const mpp = Array.isArray(brands) ? brands.find(function (b) { return b.slug === "myplanningportal"; }) : null;
      if (!mpp) return;
      if (mpp.logo_url) document.getElementById("portal-logo").src = API_BASE_URL + mpp.logo_url;
      if (mpp.primary_color) document.body.style.background = mpp.primary_color;
    } catch (err) { /* keep the hardcoded defaults on any error */ }
  })();

  const form = document.getElementById("signup-form");
  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submit-btn");

  function showStatus(kind, message) {
    status.textContent = message;
    status.className = "portal-status show " + kind;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    if (password.length < 8) {
      showStatus("error", "Password needs to be at least 8 characters.");
      return;
    }
    if (password !== confirmPassword) {
      showStatus("error", "Passwords don't match.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Creating account...";
    status.className = "portal-status";

    try {
      const resp = await fetch(API_BASE_URL + "/api/auth/customer-signup", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          email: email,
          password: password,
          first_name: document.getElementById("first-name").value.trim() || null,
          last_name: document.getElementById("last-name").value.trim() || null,
          portal_url: window.location.origin
        })
      });

      const data = await resp.json().catch(function () { return null; });

      if (!resp.ok) {
        showStatus("error", (data && data.error) || "Something went wrong. Try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Create account";
        return;
      }

      showStatus("success", (data && data.message) || "Check your email to confirm your account.");
      submitBtn.textContent = "Check your email";
      form.querySelectorAll("input, button").forEach(function (el) { el.disabled = true; });
    } catch (err) {
      showStatus("error", "Couldn't reach the server. Check your connection and try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Create account";
    }
  });
</script>

</body>
</html>
