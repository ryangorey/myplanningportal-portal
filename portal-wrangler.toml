# Deploy config for the customer-facing myplanningportal static site
# (login.html, auth/verify/, dashboard.html, portal-styles.css, portal-config.js).
#
# This is SEPARATE from the backend API (myplanningportal-api /
# backend-wrangler.toml) -- that one runs the D1-backed Worker, this one just
# serves static files. Rename this file to wrangler.toml in whatever GitHub
# repo holds the portal files, same pattern as the RGML and Grin + Bear sites.

name = "myplanningportal-portal"
compatibility_date = "2025-01-01"

[assets]
directory = "./"
