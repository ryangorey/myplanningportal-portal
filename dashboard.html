<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your bookings | myplanningportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal-styles.css">
</head>
<body>

<div class="dashboard-page">
  <div class="dashboard-topbar">
    <img src="https://raw.githubusercontent.com/ryangorey/RGMLlogo/102e74830a7fd89dca2451699469c742463da962/my_planning_portal_logo_dark_bg_small.png" alt="myplanningportal">
    <div class="who">
      <span id="who-name"></span>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>

  <div class="dashboard-content">
    <h1>Your bookings</h1>
    <div id="bookings-list"></div>
  </div>
</div>

<script src="portal-config.js"></script>
<script>
  function getSession() {
    try {
      const raw = localStorage.getItem("mpp_session");
      return raw ? JSON.parse(raw) : null;
    } catch (err) {
      return null;
    }
  }

  function clearSessionAndRedirect() {
    localStorage.removeItem("mpp_session");
    window.location.replace("/login.html");
  }

  function money(n) {
    return "$" + Number(n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatDate(iso) {
    if (!iso) return "Date TBD";
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
  }

  function bookingCard(b) {
    const balanceDue = Math.max(0, (b.package_total || 0) - (b.deposit_paid || 0));
    return (
      '<div class="booking-card">' +
        '<span class="brand-tag">' + (b.brand_name || "myplanningportal") + '</span>' +
        '<p class="event-date">' + formatDate(b.event_date) + '</p>' +
        '<p class="event-meta">' + (b.package_name || b.event_type || "Event") +
          (b.event_type ? ' &middot; ' + b.event_type : '') + '</p>' +
        '<span class="status-pill ' + (b.status || 'inquiry') + '">' + (b.status || "inquiry") + '</span>' +
        '<div class="money-row">' +
          '<span>Total: ' + money(b.package_total) + '</span>' +
          '<span>Balance due: ' + money(balanceDue) + '</span>' +
        '</div>' +
      '</div>'
    );
  }

  async function loadDashboard() {
    const session = getSession();
    if (!session || !session.token) {
      clearSessionAndRedirect();
      return;
    }

    const authHeader = { authorization: "Bearer " + session.token };

    const meResp = await fetch(API_BASE_URL + "/api/me", { headers: authHeader });
    if (meResp.status === 401) {
      clearSessionAndRedirect();
      return;
    }
    const me = await meResp.json();
    document.getElementById("who-name").textContent =
      (me.first_name ? me.first_name + " " : "") + (me.last_name || me.email || "");

    const bookingsResp = await fetch(API_BASE_URL + "/api/me/bookings", { headers: authHeader });
    if (bookingsResp.status === 401) {
      clearSessionAndRedirect();
      return;
    }
    const bookings = await bookingsResp.json();

    const list = document.getElementById("bookings-list");
    if (!Array.isArray(bookings) || bookings.length === 0) {
      list.innerHTML = '<div class="empty-state">No bookings yet. Once you inquire or book an event, it will show up here.</div>';
      return;
    }
    list.innerHTML = bookings.map(bookingCard).join("");
  }

  document.getElementById("logout-btn").addEventListener("click", async function () {
    const session = getSession();
    if (session && session.token) {
      try {
        await fetch(API_BASE_URL + "/api/auth/customer-logout", {
          method: "POST",
          headers: { authorization: "Bearer " + session.token }
        });
      } catch (err) {
        // Ignore network errors here -- clear the local session regardless.
      }
    }
    clearSessionAndRedirect();
  });

  loadDashboard().catch(function () {
    document.getElementById("bookings-list").innerHTML =
      '<div class="empty-state">Couldn\'t load your bookings. Check your connection and refresh.</div>';
  });
</script>

</body>
</html>
