<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in | myplanningportal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="portal-styles.css">
</head>
<body>

<div class="portal-page">
  <img class="portal-logo" src="https://raw.githubusercontent.com/ryangorey/RGMLlogo/102e74830a7fd89dca2451699469c742463da962/my_planning_portal_logo_dark_bg_small.png" alt="myplanningportal">

  <div class="portal-card">
    <h1>Sign in</h1>
    <p class="portal-sub">One account for every event you're planning with us.</p>

    <div id="status" class="portal-status"></div>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="name@email.com" required autocomplete="email">
      <button type="submit" class="btn-primary" id="submit-btn">Send login link</button>
    </form>

    <p class="portal-note">We'll email you a one-time link -- no password needed.</p>
  </div>

  <p class="portal-footer">Corporate events &middot; Weddings &middot; Full-service planning</p>
</div>

<script src="portal-config.js"></script>
<script>
  const form = document.getElementById("login-form");
  const emailInput = document.getElementById("email");
  const submitBtn = document.getElementById("submit-btn");
  const status = document.getElementById("status");

  function showStatus(kind, message) {
    status.textContent = message;
    status.className = "portal-status show " + kind;
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    const email = emailInput.value.trim();
    if (!email) return;

    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";
    status.className = "portal-status";

    try {
      const resp = await fetch(API_BASE_URL + "/api/auth/customer-login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          email: email,
          portal_url: window.location.origin
        })
      });

      const data = await resp.json().catch(function () { return null; });

      if (!resp.ok) {
        showStatus("error", (data && data.error) || "Something went wrong. Try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Send login link";
        return;
      }

      showStatus("success", (data && data.message) || "Check your email for a sign-in link.");
      submitBtn.textContent = "Link sent";
      form.querySelectorAll("input, button").forEach(function (el) { el.disabled = true; });
    } catch (err) {
      showStatus("error", "Couldn't reach the server. Check your connection and try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Send login link";
    }
  });
</script>

</body>
</html>
